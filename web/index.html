<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoChat - Real-Time Chat</title>
  <meta name="description" content="Real-time chat application built with Go, WebSockets, Redis, and MySQL">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Toast Notifications Container                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- AUTH VIEW                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="auth-view" class="view">
    <div class="auth-wrapper">
      <!-- Decorative background orbs -->
      <div class="auth-bg-orb auth-bg-orb--1"></div>
      <div class="auth-bg-orb auth-bg-orb--2"></div>
      <div class="auth-bg-orb auth-bg-orb--3"></div>

      <div class="auth-card">
        <!-- Logo / Brand -->
        <div class="auth-brand">
          <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
              <path d="M12 14h16M12 20h10M12 26h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
              <defs>
                <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                  <stop stop-color="#10b981"/><stop offset="1" stop-color="#34d399"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="auth-title">GoChat</h1>
          <p class="auth-subtitle">Real-time conversations, beautifully crafted</p>
        </div>

        <!-- Tab switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Sign In</button>
          <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Sign Up</button>
          <div class="auth-tab-indicator"></div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label for="login-username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
            </div>
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" hidden></span>
          </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
          <div class="input-group">
            <label for="register-username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="register-username" placeholder="Choose a username" required autocomplete="username">
            </div>
          </div>
          <div class="input-group">
            <label for="register-email">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="register-email" placeholder="Enter your email" required autocomplete="email">
            </div>
          </div>
          <div class="input-group">
            <label for="register-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="register-password" placeholder="Create a password" required minlength="6" autocomplete="new-password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader" hidden></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CHAT VIEW                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="chat-view" class="view" style="display:none">

    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-brand">
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="url(#logo-grad2)"/>
            <path d="M12 14h16M12 20h10M12 26h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logo-grad2" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#10b981"/><stop offset="1" stop-color="#34d399"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="header-title">GoChat</span>
        </div>
      </div>
      <div class="header-center" id="header-room-info">
        <span class="header-room-name" id="header-room-name">Select a room</span>
        <span class="header-room-desc" id="header-room-desc"></span>
      </div>
      <div class="header-right">
        <div class="user-info">
          <div class="status-dot online"></div>
          <span class="username" id="header-username">User</span>
        </div>
        <button class="btn btn-ghost btn-icon" onclick="handleLogout()" title="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <div class="chat-layout">
      <!-- Sidebar overlay for mobile -->
      <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>Rooms</h2>
          <div class="sidebar-actions">
            <button class="btn btn-sm btn-secondary" onclick="openModal('join')" title="Join a room">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              <span>Join</span>
            </button>
            <button class="btn btn-sm btn-primary" onclick="openModal('create')" title="Create a room">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>New</span>
            </button>
          </div>
        </div>
        <div class="rooms-search">
          <div class="input-wrapper input-wrapper--sm">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="room-search" placeholder="Search rooms..." oninput="filterRooms(this.value)">
          </div>
        </div>
        <div class="rooms-list" id="rooms-list">
          <!-- Rooms will be rendered here dynamically -->
          <div class="rooms-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>No rooms yet</p>
            <span>Create or join a room to start chatting</span>
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="chat-main">
        <!-- Connection status bar -->
        <div class="connection-bar" id="connection-bar" hidden>
          <div class="connection-bar-inner">
            <span class="btn-loader btn-loader--sm"></span>
            <span id="connection-bar-text">Reconnecting...</span>
          </div>
        </div>

        <!-- Empty state -->
        <div class="chat-empty" id="chat-empty">
          <div class="chat-empty-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="80" height="80">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            <h2>Welcome to GoChat</h2>
            <p>Select a room from the sidebar to start chatting, or create a new one.</p>
          </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-wrapper" id="messages-wrapper" style="display:none">
          <div class="messages-container" id="messages-container">
            <!-- Messages rendered here -->
          </div>

          <!-- Typing Indicator -->
          <div class="typing-indicator" id="typing-indicator" hidden>
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
            <span class="typing-text" id="typing-text">Someone is typing</span>
          </div>

          <!-- Message Input -->
          <form class="message-form" id="message-form" onsubmit="handleSendMessage(event)">
            <div class="message-input-wrapper">
              <textarea
                id="message-input"
                placeholder="Type a message..."
                rows="1"
                maxlength="2000"
                oninput="handleTyping()"
                onkeydown="handleMessageKeydown(event)"
              ></textarea>
              <button type="submit" class="btn btn-primary btn-send" id="send-btn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- MODAL                                                      -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()" hidden>
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Create Room</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Create Room Form -->
      <form id="create-room-form" class="modal-body" onsubmit="handleCreateRoom(event)">
        <div class="input-group">
          <label for="room-name">Room Name</label>
          <div class="input-wrapper">
            <input type="text" id="room-name" placeholder="e.g. General Discussion" required maxlength="50">
          </div>
        </div>
        <div class="input-group">
          <label for="room-description">Description <span class="label-optional">(optional)</span></label>
          <div class="input-wrapper">
            <input type="text" id="room-description" placeholder="What's this room about?" maxlength="200">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Room</button>
        </div>
      </form>

      <!-- Join Room Form -->
      <form id="join-room-form" class="modal-body" style="display:none" onsubmit="handleJoinRoom(event)">
        <div class="input-group">
          <label for="join-room-id">Room ID</label>
          <div class="input-wrapper">
            <input type="text" id="join-room-id" placeholder="Enter the room ID" required>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Join Room</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
